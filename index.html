<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellaTesto PRO 2.11 | GAVINA MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #004d40; --s: #00796b; --bg: #f8f9f9; --border: #cfd8dc; --txt: #263238; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--txt); margin: 0; }
        header { background: var(--p); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #ffca28; }
        .status-badge { display:flex; align-items:center; gap:8px; font-size:11px; background:rgba(255,255,255,0.1); padding:5px 12px; border-radius:20px; }
        .dot { width:10px; height:10px; border-radius:50%; background:#ff5252; }
        .dot.online { background:#69f0ae; box-shadow:0 0 10px #69f0ae; }
        nav.tabs { background:white; display:flex; gap:30px; padding:0 2rem; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
        .tab { padding:1.2rem 0; cursor:pointer; font-weight:700; color:#78909c; border-bottom:4px solid transparent; text-transform:uppercase; font-size:12px; }
        .tab.active { color:var(--p); border-bottom-color:var(--p); }
        .container { max-width:1200px; margin:25px auto; padding:0 15px; }
        .card { background:white; border-radius:12px; border:1px solid var(--border); box-shadow:0 5px 15px rgba(0,0,0,0.05); overflow:hidden; margin-bottom:20px; }
        .toolbar { display:flex; justify-content:space-between; align-items:center; padding:1.5rem; background:#fff; border-bottom:1px solid #eee; }
        table { width:100%; border-collapse:collapse; }
        th { background:#eceff1; padding:12px; text-align:left; font-size:11px; color:#546e7a; }
        td { padding:12px; border-bottom:1px solid #eee; font-size:14px; }
        .btn { padding:10px 18px; border-radius:8px; border:none; cursor:pointer; font-weight:700; font-size:13px; }
        .btn-p { background:var(--p); color:white; }
        .btn-ghost { background:#f5f5f5; color:#455a64; border:1px solid #ddd; }
        .modal-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; padding:15px; backdrop-filter:blur(5px); }
        .modal-ov.open { display:flex; }
        .modal { background:white; border-radius:16px; width:100%; max-width:950px; padding:2rem; max-height:90vh; overflow-y:auto; }
        .form-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px; }
        .fg label { display:block; font-size:11px; font-weight:800; margin-bottom:4px; color:var(--p); text-transform:uppercase; }
        .fg input, .fg select, .fg textarea { width:100%; padding:12px; border:1px solid #cfd8dc; border-radius:8px; font-size:14px; }
        .photo-input { border:2px dashed #ddd; border-radius:10px; padding:10px; text-align:center; cursor:pointer; background:#fafafa; display:flex; align-items:center; justify-content:center; min-height:80px; }
        .photo-input img { max-height:70px; }
        .weather-info { background:#e0f2f1; padding:10px; border-radius:8px; font-size:12px; margin-top:5px; border:1px solid #b2dfdb; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;"><div style="background:white; color:var(--p); padding:5px 10px; border-radius:5px; font-weight:900;">GAVINA</div><div style="font-size:18px; font-weight:700;">PRO 2.11</div></div>
    <div class="status-badge"><div id="dot" class="dot"></div><span id="st-text">Verifica Cloud...</span></div>
</header>

<nav class="tabs">
    <div class="tab active" onclick="swTab('reg', this)">Registro</div>
    <div class="tab" onclick="swTab('mag', this)">Magazzino</div>
    <div class="tab" onclick="swTab('rep', this)">Esportazione</div>
</nav>

<div class="container">
    <div id="v-reg" class="view">
        <div class="toolbar">
            <h2>Archivio Interventi</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-ghost" onclick="document.getElementById('modBulk').classList.add('open')">📅 Report Mensile</button>
                <button class="btn btn-p" onclick="openM()">+ Nuovo Intervento</button>
            </div>
        </div>
        <div class="card"><table><thead><tr><th><input type="checkbox" onclick="selAll(this)"></th><th>Data</th><th>Bungalow</th><th>Operaio</th><th>Azioni</th></tr></thead><tbody id="tbodyI"></tbody></table></div>
    </div>

    <div id="v-mag" class="view" style="display:none;">
        <div class="toolbar"><h2>Giacenze Articoli</h2><button class="btn btn-p" onclick="openMM()">+ Nuovo Articolo</button></div>
        <div class="card"><table><thead><tr><th>Articolo</th><th>Giacenza</th><th>Azione</th></tr></thead><tbody id="tbodyM"></tbody></table></div>
    </div>

    <div id="v-rep" class="view" style="display:none;">
        <div class="card" style="padding:4rem; text-align:center;">
            <h2>Download DB</h2>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                <button class="btn btn-p" onclick="esportaExcel()">📊 Excel</button>
                <button class="btn btn-p" onclick="esportaWord()">📝 Word</button>
            </div>
        </div>
    </div>
</div>

<!-- MODALE INTERVENTO (NUOVO/MODIFICA) -->
<div class="modal-ov" id="modI">
    <div class="modal">
        <h2 id="mTitle" style="color:var(--p); margin-bottom:1.5rem;">Scheda Lavoro</h2>
        <input type="hidden" id="f-id">
        <div class="form-grid">
            <div class="fg"><label>Data</label><input type="date" id="f-data"></div>
            <div class="fg"><label>Città (Meteo)</label>
                <input type="text" id="f-citta" placeholder="Scrivi e clicca fuori..." onchange="getWeather()">
                <div id="wInfo" class="weather-info" style="display:none;"></div>
                <input type="hidden" id="f-meteo">
            </div>
            <div class="fg"><label>Responsabile</label><input type="text" id="f-assign"></div>
            <div class="fg"><label>Operaio</label><input type="text" id="f-op"></div>
            <div class="fg"><label>Bungalow</label><input type="text" id="f-bung"></div>
            <div class="fg"><label>Area</label><input type="text" id="f-area"></div>
            <div class="fg"><label>Materiale</label><select id="f-mat-sel"></select></div>
            <div class="fg"><label>Quantità</label><input type="number" id="f-qty" value="0"></div>
            <div class="fg" style="grid-column:span 4;"><label>Descrizione Lavori</label><textarea id="f-desc" rows="3"></textarea></div>

            <div class="fg"><label>FOTO OPERAIO</label>
                <div class="photo-input" onclick="document.getElementById('i-o').click()"><input type="file" id="i-o" hidden onchange="hPhoto(this,'o')"><div id="pr-o">👤 Carica</div></div>
            </div>
            <div class="fg"><label>FOTO PRIMA</label>
                <div class="photo-input" onclick="document.getElementById('i-p').click()"><input type="file" id="i-p" hidden onchange="hPhoto(this,'p')"><div id="pr-p">📷 Foto Inizio</div></div>
                <input type="text" id="f-note-p" placeholder="Note luogo..." style="margin-top:5px;">
            </div>
            <div class="fg"><label>FOTO DOPO</label>
                <div class="photo-input" onclick="document.getElementById('i-d').click()"><input type="file" id="i-d" hidden onchange="hPhoto(this,'d')"><div id="pr-d">📸 Foto Fine</div></div>
                <input type="text" id="f-note-d" placeholder="Note luogo..." style="margin-top:5px;">
            </div>
            
            <div class="fg" style="grid-column: span 4;"><label>Note Generali Intervento</label><textarea id="f-note-gen" rows="2"></textarea></div>
            
            <div class="fg" style="grid-column: span 4;"><label>Firma</label>
                <canvas id="cvF" width="800" height="150" style="width:100%; border:1px solid #ddd; background:#fff; border-radius:10px; touch-action:none;"></canvas>
            </div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:15px; margin-top:20px;">
            <button class="btn btn-ghost" onclick="document.getElementById('modI').classList.remove('open')">Chiudi</button>
            <button class="btn btn-p" onclick="saveI()">💾 SALVA NEL CLOUD</button>
        </div>
    </div>
</div>

<!-- MODALE NUOVO ARTICOLO -->
<div class="modal-ov" id="modM">
    <div class="modal" style="max-width:400px;">
        <h2>Aggiungi Materiale</h2>
        <div class="fg"><label>Nome</label><input type="text" id="m-nome"></div><br>
        <div class="fg"><label>Giacenza</label><input type="number" id="m-giac"></div><br>
        <button class="btn btn-p" style="width:100%" onclick="saveM()">💾 Salva Articolo</button>
    </div>
</div>

<!-- MODALE REPORT MENSILE -->
<div class="modal-ov" id="modBulk">
    <div class="modal" style="max-width:500px;">
        <h3>Report Selezionati</h3>
        <textarea id="bulk-notes" style="width:100%; height:100px; margin:10px 0; padding:10px;" placeholder="Scrivi qui una nota generale per il report..."></textarea>
        <button class="btn btn-p" style="width:100%" onclick="genBulkPDF()">Crea PDF Report</button>
    </div>
</div>

<script>
const URL_SB = 'https://ukzconegwpoaculadefx.supabase.co';
const KEY_SB = 'sb_publishable_dS8SzPIks90Yd1ISjsXQFQ_T8VtusA1';

let db = null, listI=[], listM=[], fotoO=null, fotoP=null, fotoD=null, firma=null;

try { db = supabase.createClient(URL_SB, KEY_SB); } catch(e) {}

async function sync() {
    if(!db) return;
    try {
        const {data:i} = await db.from('interventi').select('*').order('data', {ascending:false});
        const {data:m} = await db.from('materiali').select('*').order('nome_articolo');
        listI=i||[]; listM=m||[]; render();
        document.getElementById('dot').classList.add('online');
        document.getElementById('st-text').textContent = 'COLLEGATO';
    } catch(e) {}
}

function render() {
    document.getElementById('tbodyI').innerHTML = listI.map(i => `<tr><td><input type="checkbox" class="sel-row" value="${i.id}"></td><td>${i.data}</td><td><b>${i.bungalow}</b></td><td>${i.operatore}</td><td><button class="btn btn-ghost" onclick="genPDF('${i.id}')">📄</button> <button class="btn btn-ghost" onclick="editI('${i.id}')">✏️</button></td></tr>`).join('');
    document.getElementById('tbodyM').innerHTML = listM.map(m => `<tr><td>${m.nome_articolo}</td><td>${m.giacenza_attuale}</td><td><button class="btn" onclick="delM('${m.id}')">🗑️</button></td></tr>`).join('');
    document.getElementById('f-mat-sel').innerHTML = '<option value="">-- Nessuno --</option>' + listM.map(m => `<option value="${m.nome_articolo}">${m.nome_articolo}</option>`).join('');
}

function openM() {
    document.getElementById('f-id').value = ''; document.getElementById('mTitle').textContent = 'Nuovo Intervento';
    document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-bung').value=''; document.getElementById('f-op').value=''; document.getElementById('f-desc').value='';
    document.getElementById('f-note-p').value=''; document.getElementById('f-note-d').value=''; document.getElementById('f-note-gen').value='';
    fotoO=null; fotoP=null; fotoD=null; firma=null;
    document.getElementById('pr-o').innerHTML='👤 Carica'; document.getElementById('pr-p').innerHTML='📷 Foto Inizio'; document.getElementById('pr-d').innerHTML='📸 Foto Fine';
    document.getElementById('modI').classList.add('open'); initCv();
}

function editI(id) {
    const r = listI.find(x => x.id === id);
    document.getElementById('f-id').value = r.id; document.getElementById('mTitle').textContent = 'Modifica Intervento';
    document.getElementById('f-data').value = r.data; document.getElementById('f-bung').value = r.bungalow;
    document.getElementById('f-op').value = r.operatore; document.getElementById('f-desc').value = r.descrizione;
    document.getElementById('f-note-p').value = r.foto_prima_note||''; document.getElementById('f-note-d').value = r.foto_dopo_note||'';
    document.getElementById('f-note-gen').value = r.nota_generale||'';
    document.getElementById('f-citta').value = r.citta||'';
    fotoO=r.foto_operaio_url; fotoP=r.foto_prima_url; fotoD=r.foto_dopo_url; firma=r.firma_url;
    if(fotoO) document.getElementById('pr-o').innerHTML=`<img src="${fotoO}">`;
    if(fotoP) document.getElementById('pr-p').innerHTML=`<img src="${fotoP}">`;
    if(fotoD) document.getElementById('pr-d').innerHTML=`<img src="${fotoD}">`;
    document.getElementById('modI').classList.add('open'); initCv();
}

async function saveI() {
    const row = {
        data: document.getElementById('f-data').value, citta: document.getElementById('f-citta').value, meteo: document.getElementById('f-meteo').value,
        responsabile_assegnazione: document.getElementById('f-assign').value, operatore: document.getElementById('f-op').value,
        bungalow: document.getElementById('f-bung').value, area: document.getElementById('f-area').value, descrizione: document.getElementById('f-desc').value,
        materiale_usato: document.getElementById('f-mat-sel').value, quantita_usata: parseFloat(document.getElementById('f-qty').value)||0,
        foto_operaio_url: fotoO, foto_prima_url: fotoP, foto_dopo_url: fotoD,
        foto_prima_note: document.getElementById('f-note-p').value, foto_dopo_note: document.getElementById('f-note-d').value,
        nota_generale: document.getElementById('f-note-gen').value, firma_url: firma, confermato:true
    };
    const id = document.getElementById('f-id').value;
    const {error} = id ? await db.from('interventi').update(row).eq('id', id) : await db.from('interventi').insert([row]);
    if(error) alert(error.message); else { document.getElementById('modI').classList.remove('open'); sync(); }
}

async function saveM() {
    const r = { nome_articolo: document.getElementById('m-nome').value, giacenza_attuale: parseFloat(document.getElementById('m-giac').value) };
    await db.from('materiali').insert([r]); document.getElementById('modM').classList.remove('open'); sync();
}

async function getWeather() {
    const cit = document.getElementById('f-citta').value; if(!cit) return;
    try {
        const gR=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${cit}`); const g=await gR.json();
        const wR=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${g[0].lat}&longitude=${g[0].lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto`);
        const w=await wR.json(); const res=`Max: ${w.daily.temperature_2m_max[0]}°C | Min: ${w.daily.temperature_2m_min[0]}°C`;
        document.getElementById('f-meteo').value=res; document.getElementById('wInfo').style.display='block'; document.getElementById('wInfo').innerHTML=res;
    } catch(e){}
}

function hPhoto(input, tipo) {
    const r=new FileReader(); r.onload=(e)=>{
        const i=new Image(); i.onload=()=>{
            const cv=document.createElement('canvas'); const s=400/i.width; cv.width=400; cv.height=i.height*s;
            cv.getContext('2d').drawImage(i,0,0,400,cv.height); const res=cv.toDataURL('image/jpeg',0.5);
            if(tipo==='o'){ fotoO=res; document.getElementById('pr-o').innerHTML=`<img src="${res}">`; }
            else if(tipo==='p'){ fotoP=res; document.getElementById('pr-p').innerHTML=`<img src="${res}">`; }
            else { fotoD=res; document.getElementById('pr-d').innerHTML=`<img src="${res}">`; }
        }; i.src=e.target.result;
    }; r.readAsDataURL(input.files[0]);
}

let ctx, drw=false;
function initCv() {
    const c=document.getElementById('cvF'); ctx=c.getContext('2d'); if(!document.getElementById('f-id').value) ctx.clearRect(0,0,c.width,c.height);
    const p=(e)=>{ const r=c.getBoundingClientRect(); return { x:(e.clientX||(e.touches&&e.touches[0].clientX))-r.left, y:(e.clientY||(e.touches&&e.touches[0].clientY))-r.top }; };
    c.onmousedown=(e)=>{ drw=true; ctx.beginPath(); ctx.moveTo(p(e).x,p(e).y); };
    c.onmousemove=(e)=>{ if(!drw)return; e.preventDefault(); ctx.lineTo(p(e).x,p(e).y); ctx.stroke(); };
    window.onmouseup=()=>{ if(drw){drw=false; firma=c.toDataURL();} };
}

function genPDF(id) {
    const r=listI.find(x => x.id === id); const {jsPDF}=window.jspdf; const doc=new jsPDF();
    doc.text("GAVINA - REPORT", 15, 15); doc.setFontSize(10);
    doc.text(`Data: ${r.data} | Bung: ${r.bungalow} | Note: ${r.nota_generale||'-'}`, 15, 25);
    if(r.foto_operaio_url) doc.addImage(r.foto_operaio_url, 'JPEG', 150, 10, 40, 40);
    if(r.foto_prima_url) doc.addImage(r.foto_prima_url, 'JPEG', 15, 60, 80, 50);
    if(r.foto_dopo_url) doc.addImage(r.foto_dopo_url, 'JPEG', 110, 60, 80, 50);
    if(r.firma_url) doc.addImage(r.firma_url, 'PNG', 15, 120, 50, 15);
    doc.save(`Gavina_${r.data}.pdf`);
}

function genBulkPDF() {
    const ids=Array.from(document.querySelectorAll('.sel-row:checked')).map(x=>x.value);
    const list=listI.filter(x=>ids.includes(x.id)); const n=document.getElementById('bulk-notes').value;
    const {jsPDF}=window.jspdf; const doc=new jsPDF(); doc.text("REPORT PERIODICO GAVINA", 15, 15);
    doc.text(n, 15, 25, {maxWidth:180});
    doc.autoTable({ head:[['Data','Bung','Desc']], body:list.map(x=>[x.data,x.bungalow,x.descrizione]), startY:40 });
    doc.save("Report_Mensile.pdf");
}

function openMM() { document.getElementById('modM').classList.add('open'); }
function swTab(v,b) { document.querySelectorAll('.view').forEach(x=>x.style.display='none'); document.getElementById('v-'+v).style.display='block'; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); b.classList.add('active'); }
function selAll(cb) { document.querySelectorAll('.sel-row').forEach(x=>x.checked=cb.checked); }
function delM(id) { db.from('materiali').delete().eq('id',id).then(sync); }
function esportaExcel() { const p=listI.map(x=>{const {foto_operaio_url,foto_prima_url,foto_dopo_url,firma_url,...rest}=x; return rest;}); XLSX.utils.book_append_sheet(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(p), "Dati"); XLSX.writeFile(XLSX.utils.book_new(), "Gavina.xlsx"); }
sync();
</script>
</body>
</html>
