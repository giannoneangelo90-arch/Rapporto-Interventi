<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CellaTesto — TEST DI RETE</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #f0f2f5; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .log { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 5px; font-family: monospace; min-height: 100px; margin-top: 10px; overflow-x: auto; }
        .green { color: #22c55e; }
        .red { color: #ef4444; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🛠️ Diagnosi Connessione Diretta</h2>
        <p>Questo test controlla se il database risponde via internet.</p>
        <button onclick="testDiretto()" style="padding:10px 20px; cursor:pointer;">AVVIA TEST</button>
        
        <div id="log-screen" class="log">In attesa del test...</div>
    </div>

<script>
function scrivi(testo, colore) {
    const screen = document.getElementById('log-screen');
    const riga = document.createElement('div');
    riga.innerHTML = "> " + testo;
    if(colore) riga.style.color = colore;
    screen.appendChild(riga);
}

async function testDiretto() {
    const screen = document.getElementById('log-screen');
    screen.innerHTML = "";
    
    // --- DATI DA CONTROLLARE ---
    const URL = ''https://ukzconegwpoaculadefx.supabase.co';
    const KEY = 'sb_publishable_dS8SzPIks90Yd1ISjsXQFQ_T8VtusA1';

    scrivi("Avvio test di rete...");
    scrivi("Indirizzo: " + URL);
    
    try {
        scrivi("Tentativo di fetch su /rest/v1/interventi...");
        
        const response = await fetch(URL + '/rest/v1/interventi?select=count', {
            method: 'GET',
            headers: {
                'apikey': KEY,
                'Authorization': 'Bearer ' + KEY
            }
        });

        if (response.ok) {
            scrivi("✅ RISPOSTA POSITIVA! Il database ha risposto.", "#4ade80");
            scrivi("Stato: " + response.status);
            alert("SUCCESSO! Il database è raggiungibile. Possiamo procedere con l'app.");
        } else {
            const errText = await response.text();
            scrivi("❌ ERRORE SERVER: " + response.status, "#f87171");
            scrivi("Dettagli: " + errText);
            alert("Errore: " + response.status + ". Leggi i dettagli nel riquadro nero.");
        }

    } catch (e) {
        scrivi("🛑 ERRORE DI RETE: " + e.message, "#f87171");
        scrivi("Suggerimento: Controlla che l'URL sia scritto bene e senza spazi.");
    }
}
</script>
</body>
</html>
