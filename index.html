<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAVINA MASTER COMMANDER 8.0</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Arial;background:#eef3f3;margin:0}
header{background:#004d40;color:#fff;padding:15px;font-weight:bold}
.container{padding:20px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:20px}
.btn{padding:10px;background:#004d40;color:#fff;border:none;border-radius:8px;cursor:pointer}
table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<header>GAVINA MASTER COMMANDER 8.0 ENTERPRISE</header>

<div class="container">

<div class="card">
<h3>REPORT STRATEGICO</h3>

<input id="obj" placeholder="OGGETTO" style="width:100%"><br><br>
<textarea id="fin" placeholder="PROGRAMMA A FINIRE" style="width:100%"></textarea><br><br>
<textarea id="pers" placeholder="PERSONALE INCARICATO" style="width:100%"></textarea><br><br>
<textarea id="rit" placeholder="RITARDI / INCIDENTI" style="width:100%"></textarea><br><br>
<input id="ore" placeholder="ORE TOTALI" style="width:100%"><br><br>
<textarea id="stato" placeholder="STATO LAVORI" style="width:100%"></textarea><br><br>

</div>

<div class="card">
<h3>SELEZIONA SCHEDE</h3>

<label><input type="checkbox" class="selI"> Schede Tecniche</label><br>
<label><input type="checkbox" class="selP"> Programma Lavoro</label><br>
<label><input type="checkbox" class="selO"> Comandi</label><br>
<label><input type="checkbox" class="selM"> Magazzino</label><br>

<br>
<button class="btn" onclick="generaReport()">GENERA REPORT WORD</button>
</div>

</div>

<script>

function now(){
return new Date().toLocaleString()
}

function generaReport(){

let h = `
<html><body style="font-family:Arial">

<h1>CAMPING GAVINA VILLAGE</h1>
<h2>REPORT TECNICO MASTER COMMANDER</h2>

<table border="1" width="100%">
<tr><td><b>OGGETTO</b></td><td>${obj.value}</td></tr>
<tr><td><b>PROGRAMMA A FINIRE</b></td><td>${fin.value}</td></tr>
<tr><td><b>PERSONALE</b></td><td>${pers.value}</td></tr>
<tr><td><b>RITARDI</b></td><td>${rit.value}</td></tr>
<tr><td><b>ORE</b></td><td>${ore.value}</td></tr>
<tr><td><b>STATO</b></td><td>${stato.value}</td></tr>
</table>
`;

if(document.querySelector('.selI').checked){
h+=`<h3>SCHEDE TECNICHE GAVINA</h3>
<p>DATA E ORA: ${now()}</p>`
}

if(document.querySelector('.selP').checked){
h+=`<h3>PROGRAMMA LAVORO</h3>
<p>DATA E ORA: ${now()}</p>`
}

if(document.querySelector('.selO').checked){
h+=`<h3>COMANDI</h3>
<p>DATA E ORA: ${now()}</p>`
}

if(document.querySelector('.selM').checked){
h+=`<h3>MAGAZZINO</h3>
<p>DATA E ORA: ${now()}</p>`
}

h+=`<br><br><center>GAVINA MASTER COMMANDER 8.0</center></body></html>`

let blob = new Blob(['\ufeff',h],{type:'application/msword'});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download="REPORT_GAVINA.doc";
a.click();

}

</script>

</body>
</html>
