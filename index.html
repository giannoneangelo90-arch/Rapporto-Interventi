<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CellaTesto PRO — Cantiere & Magazzino</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --accent: #2a5c45; --bg: #f4f3ef; --border: #e2e0d8; --radius: 12px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #1a1916; }
header { background: var(--accent); color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
.tabs { background: #fff; display: flex; border-bottom: 1px solid var(--border); padding: 0 2rem; gap: 2rem; }
.tab { padding: 1rem 0; cursor: pointer; font-weight: 600; color: #888; border-bottom: 3px solid transparent; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
.view { display: none; } .view.active { display: block; }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-weight: 600; }
.btn-primary { background: var(--accent); color: #fff; border: none; }
.card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
table { width: 100%; border-collapse: collapse; }
th { background: #f9f8f5; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; color: #777; }
td { padding: 15px; border-bottom: 1px solid var(--border); }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: flex-start; justify-content: center; padding: 1rem; overflow-y: auto; }
.modal.open { display: flex; }
.modal-content { background: #fff; border-radius: 16px; width: 100%; max-width: 800px; padding: 2rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
.full { grid-column: 1 / -1; }
input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
.stock-low { color: #b84a00; font-weight: bold; }
</style>
</head>
<body>

<header>
  <div style="font-weight:600;">CellaTesto <span>PRO</span></div>
  <div id="sync-status" style="font-size:11px;">☁️ Sincronizzazione...</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchView('interventi', this)">Interventi</div>
  <div class="tab" onclick="switchView('magazzino', this)">Magazzino</div>
</div>

<div class="container">
  <!-- VISTA INTERVENTI -->
  <div id="view-interventi" class="view active">
    <div class="toolbar">
      <h1>Registro Interventi</h1>
      <button class="btn btn-primary" onclick="openModal('interventi')">+ Nuovo Intervento</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Data</th><th>Casa</th><th>Operatore</th><th>Materiali Usati</th><th>Azioni</th></tr></thead>
        <tbody id="interventi-body"></tbody>
      </table>
    </div>
  </div>

  <!-- VISTA MAGAZZINO -->
  <div id="view-magazzino" class="view">
    <div class="toolbar">
      <h1>Inventario Magazzino</h1>
      <button class="btn btn-primary" onclick="openModal('magazzino')">+ Aggiungi Articolo</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Nome Materiale</th><th>Quantità Disponibile</th><th>Unità</th><th>Azioni</th></tr></thead>
        <tbody id="magazzino-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODALE INTERVENTO -->
<div class="modal" id="modalInv">
  <div class="modal-content">
    <h2 id="modal-title">Nuovo Intervento</h2>
    <div id="form-interventi" class="grid" style="margin-top:1.5rem;">
      <div><label>Data</label><input type="date" id="f-data"></div>
      <div><label>Bungalow/Casa</label><input type="text" id="f-casa"></div>
      <div><label>Responsabile</label><input type="text" id="f-operatore"></div>
      <div>
        <label>Materiale dal Magazzino</label>
        <select id="f-mat-select"></select>
      </div>
      <div><label>Quantità da scaricare</label><input type="number" id="f-mat-qty" value="0"></div>
      <div class="full"><label>Descrizione Lavoro</label><textarea id="f-desc"></textarea></div>
      <div class="full">
        <button class="btn btn-primary" onclick="salvaIntervento()">💾 Salva e Scarica Magazzino</button>
      </div>
    </div>

    <!-- FORM AGGIUNTA MAGAZZINO -->
    <div id="form-magazzino" class="grid" style="display:none; margin-top:1.5rem;">
      <div class="full"><label>Nome Articolo</label><input type="text" id="m-nome"></div>
      <div><label>Quantità Iniziale</label><input type="number" id="m-qty"></div>
      <div><label>Unità (pz, metri, sacchi)</label><input type="text" id="m-unita" value="pz"></div>
      <div class="full">
        <button class="btn btn-primary" onclick="salvaArticolo()">📦 Aggiungi al Magazzino</button>
      </div>
    </div>
    <button class="btn" style="margin-top:1rem; width:100%;" onclick="closeModal()">Chiudi</button>
  </div>
</div>

<script>
// --- CHIAVI SUPABASE ---
const S_URL = 'https://ukzconegwpoaculadefx.supabase.co/rest/v1/.supabase.co'; 
const S_KEY = 'sb_publishable_dS8SzPIks90Yd1ISjsXQFQ_T8VtusA1'; // <--- CONTINUA TU
let db = null;
if (window.supabase) db = window.supabase.createClient(S_URL, S_KEY);

let interventi = [], materiali = [];

function switchView(view, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  el.classList.add('active');
}

async function sync() {
  if (!db) return;
  const { data: m } = await db.from('materiali').select('*');
  const { data: i } = await db.from('interventi').select('*').order('data', {ascending:false});
  materiali = m || []; interventi = i || [];
  render();
  updateSelect();
}

function render() {
  document.getElementById('interventi-body').innerHTML = interventi.map(r => `<tr>
    <td>${r.data}</td><td>${r.casa}</td><td>${r.operatore}</td><td>${r.mat || '-'} (${r.qty || 0})</td>
    <td><button class="btn" onclick="deleteIntervento('${r.id}')">🗑️</button></td>
  </tr>`).join('');

  document.getElementById('magazzino-body').innerHTML = materiali.map(m => `<tr>
    <td><b>${m.nome}</b></td>
    <td class="${m.qty < 5 ? 'stock-low' : ''}">${m.qty}</td>
    <td>${m.unita}</td>
    <td><button class="btn" onclick="deleteMateriale('${m.id}')">🗑️</button></td>
  </tr>`).join('');
}

function updateSelect() {
  const sel = document.getElementById('f-mat-select');
  sel.innerHTML = '<option value="">-- Nessuno --</option>' + materiali.map(m => `<option value="${m.nome}">${m.nome} (Disponibili: ${m.qty})</option>`).join('');
}

function openModal(type) {
  document.getElementById('modalInv').classList.add('open');
  if (type === 'interventi') {
    document.getElementById('form-interventi').style.display = 'grid';
    document.getElementById('form-magazzino').style.display = 'none';
    document.getElementById('modal-title').textContent = 'Nuovo Intervento';
  } else {
    document.getElementById('form-interventi').style.display = 'none';
    document.getElementById('form-magazzino').style.display = 'grid';
    document.getElementById('modal-title').textContent = 'Nuovo Articolo Magazzino';
  }
}
function closeModal() { document.getElementById('modalInv').classList.remove('open'); }

// SALVATAGGIO INTERVENTO + SCARICO MAGAZZINO
async function salvaIntervento() {
  const nomeMat = document.getElementById('f-mat-select').value;
  const qtyUsata = parseInt(document.getElementById('f-mat-qty').value);
  
  const row = {
    id: 'I-'+Date.now(), data: document.getElementById('f-data').value,
    casa: document.getElementById('f-casa').value, operatore: document.getElementById('f-operatore').value,
    desc: document.getElementById('f-desc').value, mat: nomeMat, qty: qtyUsata
  };

  // 1. Salva Intervento
  await db.from('interventi').insert([row]);

  // 2. Se è stato usato un materiale, scala dal magazzino
  if (nomeMat && qtyUsata > 0) {
    const art = materiali.find(m => m.nome === nomeMat);
    const nuovaQty = Math.max(0, art.qty - qtyUsata);
    await db.from('materiali').update({ qty: nuovaQty }).eq('id', art.id);
  }
  
  closeModal(); sync();
}

async function salvaArticolo() {
  const art = {
    id: 'M-'+Date.now(), nome: document.getElementById('m-nome').value,
    qty: parseInt(document.getElementById('m-qty').value), unita: document.getElementById('m-unita').value
  };
  await db.from('materiali').insert([art]);
  closeModal(); sync();
}

async function deleteIntervento(id) { if(confirm("Eliminare?")) { await db.from('interventi').delete().eq('id', id); sync(); } }
async function deleteMateriale(id) { if(confirm("Eliminare dal magazzino?")) { await db.from('materiali').delete().eq('id', id); sync(); } }

if (db) sync();
</script>
</body>
</html>
