<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CellaTesto PRO 2.7 | Finale</title>
    <!-- Usiamo la versione universale più stabile -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1e4d3a; --s: #2a5c45; --bg: #f8f9fa; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: var(--p); color: white; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { display: flex; align-items: center; gap: 8px; font-size: 11px; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4d4d; }
        .dot.online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-p { background: var(--s); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #fafafa; padding: 15px; color: #999; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        #debug-log { display: none; background: #000; color: #0f0; padding: 15px; border-radius: 8px; font-family: monospace; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; font-weight: 700;">CellaTesto PRO 2.7</div>
    <div class="status-badge">
        <div id="dot" class="dot"></div>
        <span id="st-text">Verifica in corso...</span>
    </div>
</header>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Gestione Interventi</h2>
        <div>
            <button class="btn-p" onclick="apriNuovo()">+ Nuovo Intervento</button>
            <button class="btn-p" style="background:#444;" onclick="mostraDebug()">Diagnosi</button>
        </div>
    </div>

    <div id="debug-log"></div>

    <table>
        <thead><tr><th>Data</th><th>Bungalow</th><th>Operaio</th><th>Azioni</th></tr></thead>
        <tbody id="lista"></tbody>
    </table>
</div>

<script>
const URL_SB = 'https://ukzconegwpoaculadefx.supabase.co';
const KEY_SB = 'sb_publishable_dS8SzPIks90Yd1ISjsXQFQ_T8VtusA1';

let db = null;

function log(msg) {
    const d = document.getElementById('debug-log');
    d.innerHTML += "> " + msg + "<br>";
    console.log(msg);
}

function mostraDebug() { document.getElementById('debug-log').style.display = 'block'; }

async function init() {
    log("Inizializzo client...");
    try {
        db = supabase.createClient(URL_SB, KEY_SB);
        log("Client creato. Scarico dati...");
        
        const { data, error } = await db.from('interventi').select('*').order('data', {ascending: false});
        
        if (error) {
            log("ERRORE DATABASE: " + error.message);
            document.getElementById('st-text').textContent = "ERRORE CONNESSIONE";
        } else {
            log("Dati scaricati: " + data.length + " righe");
            render(data);
            document.getElementById('dot').classList.add('online');
            document.getElementById('st-text').textContent = "COLLEGATO AL CLOUD";
        }
    } catch (e) {
        log("ERRORE CRITICO JS: " + e.message);
    }
}

function render(data) {
    const list = document.getElementById('lista');
    if(data.length === 0) {
        list.innerHTML = '<tr><td colspan="4" style="text-align:center;">Nessun dato. Prova a cliccare Nuovo Intervento.</td></tr>';
        return;
    }
    list.innerHTML = data.map(i => `<tr><td>${i.data}</td><td><b>${i.bungalow}</b></td><td>${i.operatore}</td><td>-</td></tr>`).join('');
}

// Avvio
window.onload = init;
</script>
</body>
</html>
