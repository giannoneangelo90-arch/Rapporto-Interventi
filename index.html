<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAVINA MASTER COMMANDER 6.0</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f2f7f7;margin:0;}
header{background:#004d40;color:white;padding:15px;font-weight:bold;}
.container{padding:20px;}
.card{background:white;padding:20px;border-radius:15px;margin-bottom:20px;}

.kpi{display:flex;gap:10px;}
.kpi div{flex:1;background:#004d40;color:white;padding:15px;border-radius:10px;text-align:center;}

button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>

<body>

<header>GAVINA MASTER COMMANDER 6.0</header>

<div class="container">

<!-- KPI -->
<div class="card kpi">
<div><b>Interventi</b><div id="kpi-int">0</div></div>
<div><b>Ore</b><div id="kpi-ore">0</div></div>
<div><b>Comandi</b><div id="kpi-ord">0</div></div>
<div><b>Magazzino</b><div id="kpi-mag">0</div></div>
</div>

<!-- BOTTONI -->
<div class="card">
<button onclick="generaPDF()">📄 REPORT PDF</button>
<button onclick="alertLavori()">⚠️ Controllo Lavori</button>
</div>

</div>

<script>
const db = supabase.createClient(
'https://ukzconegwpoaculadefx.supabase.co',
'sb_publishable_dS8SzPIks90Yd1ISjsXQFQ_T8VtusA1'
);

let listI=[], listOrd=[], listM=[];

// CARICA DATI
async function sync(){
    const {data:i}=await db.from('interventi').select('*');
    const {data:o}=await db.from('ordini').select('*');
    const {data:m}=await db.from('materiali').select('*');

    listI=i||[];
    listOrd=o||[];
    listM=m||[];

    render();
}

// KPI
function render(){
    const now=new Date();

    const settimana=listI.filter(i=>{
        const d=new Date(i.data);
        return (now-d)/(1000*60*60*24)<=7;
    });

    document.getElementById('kpi-int').innerText=settimana.length;
    document.getElementById('kpi-ore').innerText=(settimana.length*1.5).toFixed(1);
    document.getElementById('kpi-ord').innerText=listOrd.filter(o=>o.stato!=='Chiuso').length;
    document.getElementById('kpi-mag').innerText=listM.length;
}

// ALERT
function alertLavori(){
    const aperti=listOrd.filter(o=>o.stato!=='Chiuso');

    if(aperti.length===0){
        alert("Tutto completato");
    }else{
        alert("Lavori aperti: "+aperti.length);
    }
}

// PDF
function generaPDF(){
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF();

    let y=10;
    const now=new Date();

    doc.text("REPORT GAVINA 6.0",10,y); y+=10;
    doc.text(now.toLocaleString(),10,y); y+=10;

    listI.slice(0,20).forEach(i=>{
        doc.text(`${i.data} ${i.ora||''} - ${i.bungalow}`,10,y);
        y+=6;
    });

    doc.save("report_gavina.pdf");
}

// AVVIO
sync();
setInterval(sync,20000);
</script>

</body>
</html>
