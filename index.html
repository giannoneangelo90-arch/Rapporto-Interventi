<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellaTesto PRO 2.4 — Diagnosi Attiva</title>
    <!-- Caricamento Supabase Standard -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f3ef; padding: 20px; }
        #debug-box { background: #fee2e2; color: #991b1b; padding: 15px; border-radius: 8px; display: none; margin-bottom: 20px; border: 1px solid #f87171; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; background: #2a5c45; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Box che appare SOLO se c'è un errore nel codice -->
    <div id="debug-box">
        <b>⚠️ ERRORE RILEVATO:</b> <span id="error-msg"></span>
    </div>

    <div class="card">
        <h1>📋 CellaTesto PRO 2.4</h1>
        <p>Stato Connessione: <span id="status-label" class="status" style="background:#f87171; color:white;">VERIFICA IN CORSO...</span></p>
        <hr>
        <div id="app-content">
            <button class="btn" onclick="testAutomatico()">🚀 CLICCA QUI PER TESTARE</button>
        </div>
    </div>

<script>
// --- DIAGNOSI ERRORI ---
window.onerror = function(msg, url, line) {
    document.getElementById('debug-box').style.display = 'block';
    document.getElementById('error-msg').textContent = msg + " (Riga: " + line + ")";
    return false;
};

// --- CHIAVI ---
const S_URL = ''https://ukzconegwpoaculadefx.supabase.co';'
const S_KEY = 'sb_publishable_dS8SzPIks90Yd1ISjsXQFQ_T8VtusA1';

let db = null;

async function testAutomatico() {
    try {
        console.log("Inizializzo Supabase...");
        
        // Prova a creare il client in due modi diversi
        if (window.supabase && window.supabase.createClient) {
            db = window.supabase.createClient(S_URL, S_KEY);
        } else if (typeof supabase !== 'undefined') {
            db = supabase.createClient(S_URL, S_KEY);
        } else {
            throw new Error("Libreria Supabase non caricata! Controlla la connessione internet.");
        }

        const label = document.getElementById('status-label');
        
        // Test di lettura
        const { data, error } = await db.from('interventi').select('count');
        
        if (error) {
            label.style.background = "#ef4444";
            label.textContent = "ERRORE: " + error.message;
            alert("Il database risponde con errore: " + error.message);
        } else {
            label.style.background = "#22c55e";
            label.textContent = "COLLEGATO AL CLOUD!";
            alert("CONGRATULAZIONI! Il sistema è connesso e funzionante.");
        }
    } catch (e) {
        alert("ERRORE CRITICO: " + e.message);
    }
}

// Avvio automatico al caricamento
setTimeout(testAutomatico, 1000);

</script>
</body>
</html>
